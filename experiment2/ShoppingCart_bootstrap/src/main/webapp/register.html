<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary d-flex align-items-center vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow p-4">
        <h3 class="text-center mb-3">Create Account</h3>

        <input type="text" class="form-control mb-3" placeholder="Full Name">
        <input type="email" class="form-control mb-3" placeholder="Email">
        <input type="password" class="form-control mb-3" placeholder="Password">
        <input type="password" class="form-control mb-3" placeholder="Confirm Password">

        <button class="btn btn-primary w-100"
          onclick="window.location.href='catalog.html'">
          Register
        </button>

        <p class="text-center mt-3">
          <a href="login.html">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>

</body>
</html>

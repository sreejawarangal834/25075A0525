<!DOCTYPE html>
<html>
<head>
<title>My Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">
  <div class="card shadow p-4">
    <h3 class="text-center mb-4">Your Cart</h3>
    <div id="cartItems"></div>
    <h5 class="text-end mt-3" id="total"></h5>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let cartDiv = document.getElementById("cartItems");

if(cart.length === 0){
  cartDiv.innerHTML = "<p class='text-center'>Cart is empty</p>";
}else{
  cart.forEach((item,i)=>{
    total += item.price;
    cartDiv.innerHTML += `
      <div class="d-flex align-items-center border-bottom py-2">
        <img src="${item.image}" width="80">
        <div class="ms-3 flex-grow-1">
          <h6>${item.name}</h6>
          <strong class="text-success">${item.price}/-</strong>
        </div>
        <button class="btn btn-danger btn-sm" onclick="removeItem(${i})">Remove</button>
      </div>`;
  });
  document.getElementById("total").innerHTML = "Total: ₹" + total;
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f4f6f8;
}
.form-container {
  background: white;
  padding: 2rem;
  border-radius: 10px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}
h2 { text-align: center; }
form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
input {
  padding: 0.7rem;
  border-radius: 5px;
  border: 1px solid #ccc;
}
button {
  padding: 0.8rem;
  background: #28a745;
  border: none;
  color: white;
  border-radius: 5px;
}
a { text-align: center; color: #28a745; text-decoration: none; }
</style>
</head>
<body>
<div class="form-container">
  <h2>Login</h2>
  <form>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
      <div>By continuing, you agree to Web App's <a href="#">Terms of Use</a> and <a href="#">Privacy Policy.</a></div>
        
                     
                     <button onclick="window.location.href='catalog.html'">
  Login 
</button>
                     
                    
             
    
    
    <a href="register.html">
  Register here!
</a>
    
  </form>
  
</div>
</body>
</html>

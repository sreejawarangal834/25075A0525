 <!DOCTYPE html>
<html>
<head>
 
<title>My Cart</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.cart-container{
  width: 80%;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

h2{
  text-align: center;
  margin-bottom: 30px;
}

.cart-item{
  display: flex;
  align-items: center;
  border-bottom: 1px solid #ddd;
  padding: 15px 0;
}

.cart-item img{
  width: 100px;
  height: 130px;
}

.details{
  flex: 1;
  margin-left: 20px;
}

.price{
  color: green;
  font-weight: bold;
}

button{
  background: #ff4d4d;
  color: white;
  border: none;
  border-radius: 15px;
  padding: 8px 15px;
  cursor: pointer;
}

.total{
  text-align: right;
  font-size: 18px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="cart-container">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <div class="total" id="total"></div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartItemsDiv = document.getElementById("cartItems");
let totalPrice = 0;

if(cart.length === 0){
  cartItemsDiv.innerHTML = "<h3>Your cart is empty</h3>";
}else{
  cart.forEach((item, index) => {
    totalPrice += item.price;

    cartItemsDiv.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}">
        <div class="details">
          <h4>${item.name}</h4>
          <div class="price">${item.price}/-</div>
        </div>
        <button onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").innerHTML =
    "<strong>Total: " + totalPrice + "/-</strong>";
}

function removeItem(index){
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
}
</script>

</body>
</html>
